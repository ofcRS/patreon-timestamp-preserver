<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch History</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Watch History</h1>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="in-progress">In Progress</button>
      <button class="tab" data-tab="completed">Completed</button>
    </nav>

    <main>
      <div id="in-progress" class="tab-content active">
        <div class="video-list" id="in-progress-list"></div>
      </div>
      <div id="completed" class="tab-content">
        <div class="video-list" id="completed-list"></div>
      </div>
    </main>

    <footer>
      <button id="clear-all" class="btn-secondary">Clear All</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
